# heavymetal/mypy.ini
[mypy]
python_version = 3.14
pretty = True
show_error_codes = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
no_implicit_optional = True
strict_optional = True
# Start permissive (gradual typing)
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
ignore_missing_imports = True
# Faster dev feedback
incremental = True

# Tightened modules — fully typed, so require annotations and check bodies.
# Expand this list as more of the backend is typed.
[mypy-backend.measurements,backend.routes.api,backend.routes.imports,backend.routes.log]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True

# `app.wsgi_app = ProxyFix(...)` is the documented Flask middleware pattern, but
# mypy flags it as `method-assign` whenever Flask's types are visible (CI / local
# venv) — yet not in the Flask-less pre-commit env. Disable just this code, just
# here, so every environment agrees without a brittle inline ignore.
[mypy-backend]
disable_error_code = method-assign
