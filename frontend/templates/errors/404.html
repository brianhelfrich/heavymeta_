<!-- heavymetal/frontend/templates/errors/404.html -->
{% extends "base.html" %}
{% block title %}Not Found — Heavy Metal{% endblock %}

{% block content %}
<div class="flex items-center justify-center" style="min-height:64vh">
  <div class="hm-card p-10 text-center" style="max-width:26rem">

    <div class="mx-auto mb-6 flex items-center justify-center"
         style="width:60px;height:60px;border-radius:16px;background:rgba(96,165,250,.12);color:#60a5fa">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </div>

    <p class="text-5xl font-bold tracking-tight leading-none">404</p>
    <h1 class="text-lg font-semibold mt-4">Page not found</h1>
    <p class="text-sm mt-2" style="color:rgba(255,255,255,.4)">
      That page doesn’t exist or has moved. Let’s get you back on track.
    </p>

    <a href="{{ url_for('dashboards.index') }}" class="btn-primary" style="margin-top:1.75rem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to dashboard
    </a>

  </div>
</div>
{% endblock %}
