name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitnessdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest builds the schema (create_all) + seeds user 1 against this DB
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fitnessdb_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.15.20" "pytest-cov==7.1.0" \
            "mypy==2.1.0" types-requests types-python-dateutil \
            pip-audit

      - name: Lint (ruff)
        run: ruff check backend tests

      - name: Format check (ruff)
        run: ruff format --check backend tests

      - name: Type check (mypy)
        run: mypy backend

      - name: Migrations build from scratch + match models
        env:
          FITNESS_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fitnessdb_migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "CREATE DATABASE fitnessdb_migrations;"
          flask --app backend:create_app db upgrade   # chain must build from an empty DB
          flask --app backend:create_app db check      # models must match the migration head

      - name: Run tests (with coverage)
        run: python -m pytest --cov=backend --cov-report=term-missing --cov-fail-under=90

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
